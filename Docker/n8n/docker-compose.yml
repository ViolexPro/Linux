version: '3.8'

volumes:
  db_storage:
  n8n_storage:

services:
  postgres:
    image: postgres:16
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_NON_ROOT_USER
      - POSTGRES_NON_ROOT_PASSWORD
    volumes:
      - /opt/n8n/db_storage:/var/lib/postgresql/data
      - /opt/n8n/init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-network

  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}

      # Настройки раннеров
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679  # Внутренний порт для раннеров

      # Безопасность
      - N8N_SECURE_COOKIE=false  # Для локальной разработки, для продакшена true + HTTPS
      - N8N_HOST=localhost
      - N8N_PROTOCOL=http

      # Дополнительные настройки
      - N8N_METRICS=true  # Включить метрики (опционально)
      - N8N_HOST=${YOUR_DOMAIN_OR_IP}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${YOUR_DOMAIN_OR_IP}/
      - N8N_EDITOR_BASE_URL=https://${YOUR_DOMAIN_OR_IP}
    ports:
      - "5678:5678"  # Основной веб-интерфейс
      - "5679:5679"  # Порт для раннеров (внутренний)
    volumes:
      - /opt/n8n/n8n_storage:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n8n-network

  n8n-runner:
    image: n8nio/runners:${N8N_VERSION}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    environment:
      - N8N_RUNNERS_AUTH_TOKEN=${RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_MODE=external
    depends_on:
      - n8n
    networks:
      - n8n-network
    # Ограничение ресурсов для раннеров
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  n8n-network:
    driver: bridge
