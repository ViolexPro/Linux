---
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"  # Откроем дашборд на порту 3000
    volumes:
      - /opt/homepage/config:/app/config      # Папка с настройками
#      - /var/run/docker.sock:/var/run/docker.sock  # Для интеграции с Docker (опционально)
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=dashboard.pzsp.ru,172.16.0.41:3000,localhost:3000,127.0.0.1:3000
      - DOCKER_HOST=tcp://docker-proxy:2375
      - PUID=1000
      - PGID=1000
      - BASIC_AUTH_USER=admin
      - BASIC_AUTH_PASS=amd#RULES123
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: dockerproxy
    environment:
      - CONTAINERS=1 # Allow access to viewing containers
      - SERVICES=1 # Allow access to viewing services (necessary when using Docker Swarm)
      - TASKS=1 # Allow access to viewing tasks (necessary when using Docker Swarm)
      - POST=0 # Disallow any POST operations (effectively read-only)
    ports:
      - 127.0.0.1:2375:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # Mounted as read-only
    restart: unless-stopped
