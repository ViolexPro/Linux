services:
  mariadb:
    image: mariadb:10.11
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /opt/moodle-docker/moodle_db_data:/var/lib/mysql
    networks:
      - moodle_network
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --wait_timeout=28800
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  moodle:
    build: .
    container_name: moodle_app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "80"
    environment:
      - MOODLE_DB_HOST=${MOODLE_DB_HOST}
      - MOODLE_DB_NAME=${MOODLE_DB_NAME}
      - MOODLE_DB_USER=${MOODLE_DB_USER}
      - MOODLE_DB_PASSWORD=${MOODLE_DB_PASSWORD}
      - MOODLE_WWWROOT=${MOODLE_WWWROOT}
      - MOODLE_DATAROOT=${MOODLE_DATAROOT}
    volumes:
      - /opt/moodle-docker/moodledata:/var/www/moodledata
    networks:
      - moodle_network

  nginx:
    image: nginx:alpine
    container_name: moodle_nginx
    restart: unless-stopped
    depends_on:
      - moodle
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/moodle-docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/moodle-docker/certificates:/etc/nginx/ssl:ro
      - /opt/moodle-docker/nginx/auth/.htpasswd:/etc/nginx/auth/.htpasswd
      - /opt/moodle-docker/nginx/config.d:/etc/nginx/conf.d/
      - /opt/moodle-docker/nginx/sites-available:/etc/nginx/sites-available/
      - /opt/moodle-docker/nginx/sites-enabled:/etc/nginx/sites-enabled/
    networks:
      - moodle_network

networks:
  moodle_network:
    driver: bridge
