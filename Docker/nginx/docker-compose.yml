#version: '3.8'

services:
  nginx:
    image: nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    ports:
       - "80:80"
       - "443:443"
    volumes:
        - '/opt/nginx/auth/.htpasswd:/etc/nginx/auth/.htpasswd'
        - '/opt/nginx/config.d:/etc/nginx/conf.d/'
        - '/opt/nginx/sites-available:/etc/nginx/sites-available/'
        - '/opt/nginx/sites-enabled:/etc/nginx/sites-enabled/'
        - '/opt/nginx/nginx.conf:/etc/nginx/nginx.conf'
        - '/opt/nginx/ssl:/etc/nginx/ssl:ro'
    container_name: nginx
