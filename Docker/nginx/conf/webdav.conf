# Перенаправление HTTP на HTTPS (для WebDAV)
server {
    listen 80;
    listen [::]:80;
    server_name webdav.pzsp.ru;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webdav.pzsp.ru;

    # ========== SSL НАСТРОЙКИ ==========
    ssl_certificate /home/deadman/ssl/pzsp.ru.fullchain.crt;
    ssl_certificate_key /home/deadman/ssl/pzsp.ru.key;
    ssl_trusted_certificate /home/deadman/ssl/pzsp.ru.ca_bundle;

    # Современные протоколы (только безопасные)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Современные cipher-наборы (приоритет на безопасность)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # Параметры для производительности и безопасности
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling (ускоряет проверку сертификатов)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========== SECURITY HEADERS ==========
    # Защита от clickjacking
    add_header X-Frame-Options "DENY" always;

    # Защита от MIME-атак
    add_header X-Content-Type-Options "nosniff" always;

    # Защита от XSS (современные браузеры)
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS - принудительное HTTPS (включить после тестирования)
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== ЛОГИРОВАНИЕ ==========
    access_log /var/log/nginx/webdav.access.log;
    error_log /var/log/nginx/webdav.error.log warn;

    # ========== НАСТРОЙКИ ДЛЯ WebDAV ==========
    client_max_body_size 10G;      # Максимальный размер загружаемого файла (WebDAV может большие файлы)
    client_body_timeout 300s;      # Дольше таймаут для больших файлов
    client_header_timeout 60s;
    keepalive_timeout 65s;

    # Включаем WebDAV методы
    dav_methods PUT DELETE MKCOL COPY MOVE;
    dav_ext_methods PROPFIND OPTIONS LOCK UNLOCK;

    # Автозавершение коллекций (папок)
    create_full_put_path on;

    # ========== ОСНОВНОЙ LOCATION (WebDAV) ==========
    location / {
        # Если WebDAV сервер отдельный (например, 172.16.10.215:5006)
        proxy_pass https://172.16.10.215:5006;

        # ИЛИ если WebDAV на том же сервере (локальная директория):
        # root /var/www/webdav;
        # autoindex on;
        # autoindex_exact_size off;
        # autoindex_localtime on;

        # Базовые заголовки прокси
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Заголовки для WebDAV
        proxy_set_header Destination $http_destination;
        proxy_set_header Depth $http_depth;
        proxy_set_header Overwrite $http_overwrite;
        proxy_set_header Content-Type $content_type;

        # Таймауты для больших файлов
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Буферизация (отключаем для больших файлов)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
    }

    # ========== ОБРАБОТКА ОШИБОК ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
