# Перенаправление HTTP на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name docmost.pzsp.ru;

    # HSTS preload (не отправляем через HTTP)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docmost.pzsp.ru;

    # ========== SSL НАСТРОЙКИ ==========
    ssl_certificate /etc/nginx/ssl/pzsp.ru.crt;
    ssl_certificate_key /etc/nginx/ssl/pzsp.ru.key;
    ssl_trusted_certificate /etc/nginx/ssl/pzsp.ru.ca_bundle;

    # Современные протоколы (только безопасные)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Современные cipher-наборы (приоритет на безопасность)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;

    # Параметры для производительности и безопасности
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP Stapling (ускоряет проверку сертификатов)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ========== SECURITY HEADERS ==========
    # Защита от clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Защита от MIME-атак
    add_header X-Content-Type-Options "nosniff" always;

    # Защита от XSS (современные браузеры)
    add_header X-XSS-Protection "1; mode=block" always;

    # HSTS - принудительное HTTPS (включить после тестирования)
    add_header Strict-Transport-Security "max-age=31536000; includeSubdomains" always;

    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy (базовая)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https: wss:; frame-ancestors 'self';" always;

    # ========== ЛОГИРОВАНИЕ ==========
    access_log /var/log/nginx/docmost.access.log;
    error_log /var/log/nginx/docmost.error.log warn;

    # ========== ОГРАНИЧЕНИЯ (защита от DoS) ==========
    client_max_body_size 100M;  # Максимальный размер загружаемого файла
    client_body_timeout 60s;     # Таймаут чтения тела запроса
    client_header_timeout 60s;   # Таймаут чтения заголовков
    keepalive_timeout 65s;       # Таймаут keepalive соединений

    # ========== ОСНОВНОЙ LOCATION ==========
    location / {
        proxy_pass http://172.16.0.37:3030;

        # Базовые заголовки прокси
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # ========== КРИТИЧЕСКИ ВАЖНО ДЛЯ WEBSOCKET ==========
        proxy_http_version 1.1;                                      # Обязательно для WebSocket
        proxy_set_header Upgrade $http_upgrade;                      # Поддержка WebSocket
        proxy_set_header Connection "upgrade";                       # Поддержка WebSocket
        proxy_cache_bypass $http_upgrade;                            # Отключает кеш для WebSocket

        # Таймауты для долгих соединений
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Буферизация ВКЛЮЧЕНА (убрали "off")
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

    }

    # ========== СТАТИЧЕСКИЕ ФАЙЛЫ (проксируется на бэкенд, но кешируется nginx) ==========
    location /static/ {
        proxy_pass http://172.16.0.37:3030;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========== ОБРАБОТКА ОШИБОК ==========
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
