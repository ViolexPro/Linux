#version: '3.8'

services:
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - POST=0
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
