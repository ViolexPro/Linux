services:
  docmost:
    image: docmost/docmost:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - /opt/secrets/.env
    depends_on:
      - db
      - redis
    environment:
      APP_URL: "http://localhost:3000"
      APP_SECRET: ${DOCMOST_APP_SECRET}
      DATABASE_URL: "postgresql://docmost:${DOCMOST_POSTGRES_PASSWORD}3@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
      # Добавьте эти строки
      STORAGE_DRIVER: "local"
      STORAGE_LOCAL_PATH: "/app/data/uploads"
      UPLOADS_DIR: "/app/data/uploads"
      NODE_ENV: "production"
      # Добавьте режим отладки
      DEBUG: "docmost:*"
      LOG_LEVEL: "debug"
    ports:
      - "3030:3000"
    restart: unless-stopped
    volumes:
#      - ./docmost:/app/data/storage
      - /opt/docmost/ssl:/etc/ssl/certs:ro
#      - /opt/docmost/docmost/data:/app/data
      - /opt/docmost/docmost/data/storage:/app/data/storage
      - /opt/docmost/docmost/data/uploads:/app/data/uploads
  db:
    image: postgres:16-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - /opt/secrets/.env
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: ${DOCMOST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DOCMOST_POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - ./db_data:/var/lib/postgresql/data
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
volumes:
  docmost:
  db_data:
  redis_data:
