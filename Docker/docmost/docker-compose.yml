services:
  docmost:
    image: docmost/docmost:latest
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
      - redis
    environment:
      APP_URL: "http://localhost:3000"
      APP_SECRET: "26a6e6fa2b89fac8ca0e6523d016b403d4a03960366b6db4cb97b7349f8626324b2d8a1e7156408083cf55d3d41f254df17de36160553b3e340d6da0f3ce5cc5eb901c902ddcbf97e001acc79c771bcf5fbbaaaa>
      DATABASE_URL: "postgresql://docmost:baikal%23RULES123@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
      # Добавьте эти строки
      STORAGE_DRIVER: "local"
      STORAGE_LOCAL_PATH: "/app/data/uploads"
      UPLOADS_DIR: "/app/data/uploads"
      NODE_ENV: "production"
      # Добавьте режим отладки
      DEBUG: "docmost:*"
      LOG_LEVEL: "debug"
    ports:
      - "3030:3000"
    restart: unless-stopped
    volumes:
#      - ./docmost:/app/data/storage
      - /opt/docmost/docmost/data:/app/data
      - /opt/docmost/docmost/data/uploads:/app/data/uploads/
  db:
    image: postgres:16-alpine
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: baikal#RULES123
    restart: unless-stopped
    volumes:
      - ./db_data:/var/lib/postgresql/data
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
volumes:
  docmost:
  db_data:
  redis_data:
